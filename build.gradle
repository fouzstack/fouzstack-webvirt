plugins {
    id 'com.android.library'
    id 'maven-publish'
}

android {
    compileSdk 34

    defaultConfig {
        minSdk 19
    }

    publishing {
        singleVariant('release') {
            withSourcesJar()
        }
    }
}

group = 'com.github.fouzstack'   
version = '1.0.0'

afterEvaluate {
    publishing {
        publications {
            release(MavenPublication) {
                from components.release
                groupId = 'com.github.fouzstack'
                artifactId = 'webvirt'
                version = '1.0.0'
            }
        }
    }
}